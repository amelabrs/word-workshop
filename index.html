<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Word Workshop</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="images/icon-192.svg">
</head>
<body x-data="wordWorkshop()" x-cloak>

  <div class="header">
    <div class="mascot" :class="{ bobbing: mascotBob }">🤖</div>
    <div class="title-block">
      <h1>Word Workshop</h1>
      <p>listen &middot; point &middot; say it back</p>
    </div>
    <button class="progress-toggle" @click="showProgress = !showProgress" aria-label="View progress">📊</button>
  </div>

  <div class="bubble" x-text="bubble"></div>

  <div class="folder-row">
    <template x-for="key in folderKeys" :key="key">
      <button class="folder-tab" :class="{ active: currentFolder === key }" @click="selectFolder(key)">
        <span x-text="'📁 ' + folders[key].label"></span>
        <span class="folder-progress" x-text="progressCount(key)"></span>
      </button>
    </template>
  </div>

  <div class="mode-row">
    <button class="mode-btn" :class="{ active: currentMode === 'match' }" @click="selectMode('match')">👂 Listen &amp; Match</button>
    <button class="mode-btn" :class="{ active: currentMode === 'phonics' }" @click="selectMode('phonics')">🗣️ Say It</button>
  </div>

  <div class="stage">

    <!-- ===== Listen & Match ===== -->
    <template x-if="currentMode === 'match' && matchTarget">
      <div>
        <div class="replay-row">
          <button class="replay-btn" @click="replay()">🔊</button>
        </div>
        <div class="card-grid">
          <template x-for="opt in matchOptions" :key="opt.word">
            <div class="word-card" :class="pickClass(opt.word)" @click="pick(opt)" x-text="opt.icon"></div>
          </template>
        </div>
        <div class="progress-row">
          <template x-for="(w, i) in words" :key="w.word">
            <div class="dot-pip" :class="{ done: i < matchDone }"></div>
          </template>
        </div>
      </div>
    </template>

    <template x-if="currentMode === 'match' && !matchTarget">
      <div class="phonics-card">
        <div class="phonics-icon">🏆</div>
        <h2>All done!</h2>
        <button class="pb whole" style="margin-top:18px" @click="startRound()">🔁 Play again</button>
      </div>
    </template>

    <!-- ===== Say It (phonics) ===== -->
    <template x-if="currentMode === 'phonics'">
      <div class="phonics-card">
        <div class="phonics-icon" x-text="currentWord.icon"></div>
        <p class="phonics-note" x-show="currentWord.note" x-text="currentWord.note"></p>
        <div class="chunk-row">
          <template x-for="(c, i) in currentWord.chunks" :key="i">
            <div class="chunk" :class="{ lit: litChunkIndex === i }" @click="tapChunk(i)" x-text="c"></div>
          </template>
        </div>
        <div class="phonics-buttons">
          <button class="pb slow" @click="soundOut()">🐢 Sound it out</button>
          <button class="pb whole" @click="sayWhole()">🔊 Say the word</button>
          <button class="pb next" @click="nextWord()">Next word ➡️</button>
        </div>
      </div>
    </template>

  </div>

  <div class="word-strip">
    <template x-for="(w, i) in words" :key="w.word">
      <div class="strip-item" :class="{ on: currentMode === 'phonics' && i === stripIndex }" @click="currentMode === 'phonics' && jumpTo(i)" x-text="w.icon"></div>
    </template>
  </div>

  <footer>Works best in Chrome or Safari with sound on. Tap any icon or chunk to hear it again — there's no wrong amount of replaying.</footer>

  <!-- ===== Progress panel (parent view) ===== -->
  <div class="progress-overlay" x-show="showProgress" x-cloak @click.self="showProgress = false">
    <div class="progress-panel">
      <div class="progress-panel-header">
        <h2>Progress</h2>
        <button class="icon-btn" @click="showProgress = false">✖</button>
      </div>
      <template x-for="key in folderKeys" :key="key">
        <div class="progress-folder">
          <h3 x-text="folders[key].label + ' — ' + progressCount(key)"></h3>
          <div class="progress-word-list">
            <template x-for="w in folders[key].words" :key="w.word">
              <span class="progress-word" :class="{ matched: isMatched(key, w.word) }">
                <span x-text="w.icon"></span>
                <span x-text="w.word"></span>
                <span x-show="isMatched(key, w.word)">✓</span>
              </span>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

  <script src="folders.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
