<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Word Workshop</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="images/icon-192.svg">
</head>
<body>

<div id="start-screen" class="screen active">
  <div class="header">
    <div class="mascot" id="mascot">🤖</div>
    <div class="title-block">
      <h1>Word Workshop</h1>
      <p>listen &middot; point &middot; say it back</p>
    </div>
  </div>

  <div class="tabs" id="tabs-row"></div>

  <button class="say-it-btn" id="say-it-btn">🗣️ Say It — practice this folder's words</button>

  <div class="level-grid" id="level-grid"></div>
</div>

<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <button id="quiz-back-btn" class="icon-btn">←</button>
    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    <div id="stars-display" class="stars-display">⭐ 0</div>
  </div>

  <div id="prompt-area" class="prompt-area"></div>

  <div id="choices-grid" class="choices-grid"></div>
</div>

<div id="done-screen" class="screen">
  <div class="done-card">
    <h2 id="done-title">Great job!</h2>
    <p id="done-score" class="done-score"></p>
    <p id="done-unlock-msg" class="done-unlock-msg"></p>
    <button id="done-continue-btn" class="primary-btn">Continue</button>
  </div>
</div>

<div id="phonics-screen" class="screen">
  <div class="quiz-header">
    <button id="phonics-back-btn" class="icon-btn">←</button>
    <div id="phonics-tab-label" class="phonics-tab-label"></div>
  </div>

  <div class="bubble" id="phonics-bubble">Tap each colour to hear the sound, then blend them!</div>

  <div class="stage">
    <div class="phonics-card">
      <img id="phonics-image" class="phonics-image" alt="">
      <p id="phonics-note" class="phonics-note"></p>
      <div class="chunk-row" id="chunk-row"></div>
      <div class="phonics-buttons">
        <button class="pb slow" id="phonics-sound-out-btn">🐢 Sound it out</button>
        <button class="pb whole" id="phonics-say-whole-btn">🔊 Say the word</button>
        <button class="pb next" id="phonics-next-btn">Next word ➡️</button>
      </div>
    </div>
  </div>

  <div class="word-strip" id="word-strip"></div>
</div>

<footer>Works best in Chrome or Safari with sound on. Tap any picture or chunk to hear it again — there's no wrong amount of replaying.</footer>

<script src="folders.js"></script>
<script src="app.js"></script>
</body>
</html>
